<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="soul-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="spine-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
    <linearGradient id="always-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1b4332"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <linearGradient id="demand-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a3e1b"/>
      <stop offset="100%" stop-color="#7c5e33"/>
    </linearGradient>
    <linearGradient id="output-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a1942"/>
      <stop offset="100%" stop-color="#6b2d5b"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700" letter-spacing="0.5">SATORI v5 — Architecture</text>
  <text x="400" y="54" text-anchor="middle" fill="#8b949e" font-size="11">Clinically informed wisdom companion • 180K+ characters across 6 reference files</text>

  <!-- Layer 1: SOUL.md — Constitutional Foundation -->
  <rect x="40" y="72" width="720" height="64" rx="8" fill="url(#soul-grad)" filter="url(#shadow)" stroke="#e6c07b" stroke-width="1.5" stroke-dasharray="none"/>
  <text x="60" y="96" fill="#e6c07b" font-size="10" font-weight="600" letter-spacing="1.5">CONSTITUTIONAL FOUNDATION</text>
  <text x="60" y="114" fill="#e6edf3" font-size="14" font-weight="700">SOUL.md</text>
  <text x="60" y="128" fill="#8b949e" font-size="10">Identity • Immovables • Drift Detection • Adaptation vs Integrity</text>
  <text x="720" y="114" text-anchor="end" fill="#e6c07b" font-size="9" font-weight="600">ALWAYS LOADED</text>
  <!-- Lock icon -->
  <rect x="700" y="88" width="14" height="10" rx="2" fill="none" stroke="#e6c07b" stroke-width="1.2"/>
  <path d="M703 88 V84 a4 4 0 0 1 8 0 V88" fill="none" stroke="#e6c07b" stroke-width="1.2"/>

  <!-- Layer 2: Clinical Spine — Operational Engine -->
  <rect x="40" y="148" width="720" height="76" rx="8" fill="url(#spine-grad)" filter="url(#shadow)" stroke="#61afef" stroke-width="1"/>
  <text x="60" y="170" fill="#61afef" font-size="10" font-weight="600" letter-spacing="1.5">OPERATIONAL ENGINE</text>
  <text x="60" y="188" fill="#e6edf3" font-size="14" font-weight="700">clinical-spine.md</text>
  <text x="60" y="202" fill="#8b949e" font-size="10">Core Conversation Model (6 steps) • Working Formulation • Role Model</text>
  <text x="60" y="214" fill="#8b949e" font-size="10">Memory &amp; Continuity • Dream Layer • Crisis Protocol • Pattern Tracking</text>
  <text x="720" y="188" text-anchor="end" fill="#61afef" font-size="9" font-weight="600">ALWAYS LOADED</text>

  <!-- 6-step model mini-diagram -->
  <g transform="translate(440, 164)">
    <rect x="0" y="0" width="250" height="46" rx="4" fill="rgba(97,175,239,0.1)" stroke="rgba(97,175,239,0.3)" stroke-width="0.5"/>
    <text x="8" y="13" fill="#61afef" font-size="8" font-weight="600">CONVERSATION MODEL</text>
    <!-- Steps as connected dots -->
    <circle cx="20" cy="32" r="6" fill="#e06c75" opacity="0.9"/><text x="20" y="35" text-anchor="middle" fill="#fff" font-size="6" font-weight="700">1</text>
    <line x1="26" y1="32" x2="54" y2="32" stroke="#8b949e" stroke-width="0.8"/>
    <circle cx="60" cy="32" r="6" fill="#e5c07b" opacity="0.9"/><text x="60" y="35" text-anchor="middle" fill="#1a1a2e" font-size="6" font-weight="700">2</text>
    <line x1="66" y1="32" x2="94" y2="32" stroke="#8b949e" stroke-width="0.8"/>
    <circle cx="100" cy="32" r="6" fill="#98c379" opacity="0.9"/><text x="100" y="35" text-anchor="middle" fill="#1a1a2e" font-size="6" font-weight="700">3</text>
    <line x1="106" y1="32" x2="134" y2="32" stroke="#8b949e" stroke-width="0.8"/>
    <circle cx="140" cy="32" r="6" fill="#56b6c2" opacity="0.9"/><text x="140" y="35" text-anchor="middle" fill="#1a1a2e" font-size="6" font-weight="700">4</text>
    <line x1="146" y1="32" x2="174" y2="32" stroke="#8b949e" stroke-width="0.8"/>
    <circle cx="180" cy="32" r="6" fill="#c678dd" opacity="0.9"/><text x="180" y="35" text-anchor="middle" fill="#fff" font-size="6" font-weight="700">5</text>
    <line x1="186" y1="32" x2="214" y2="32" stroke="#8b949e" stroke-width="0.8"/>
    <circle cx="220" cy="32" r="6" fill="#61afef" opacity="0.9"/><text x="220" y="35" text-anchor="middle" fill="#fff" font-size="6" font-weight="700">6</text>
  </g>

  <!-- Layer 3: Always-loaded knowledge -->
  <rect x="40" y="238" width="720" height="56" rx="8" fill="url(#always-grad)" filter="url(#shadow)" stroke="#98c379" stroke-width="1"/>
  <text x="60" y="260" fill="#98c379" font-size="10" font-weight="600" letter-spacing="1.5">KNOWLEDGE LAYER — ALWAYS LOADED</text>
  <text x="60" y="278" fill="#e6edf3" font-size="14" font-weight="700">traditions-quickref.md</text>
  <text x="60" y="290" fill="#8b949e" font-size="10">Compact selection guide: Stoicism • Buddhism • Taoism • Christianity • Sufi • Hindu • Confucian • African</text>

  <!-- Tradition icons as small colored dots -->
  <g transform="translate(620, 258)">
    <circle cx="0" cy="0" r="4" fill="#e06c75"/><circle cx="14" cy="0" r="4" fill="#e5c07b"/>
    <circle cx="28" cy="0" r="4" fill="#98c379"/><circle cx="42" cy="0" r="4" fill="#56b6c2"/>
    <circle cx="56" cy="0" r="4" fill="#c678dd"/><circle cx="70" cy="0" r="4" fill="#61afef"/>
    <circle cx="84" cy="0" r="4" fill="#d19a66"/><circle cx="98" cy="0" r="4" fill="#be5046"/>
  </g>

  <!-- Layer 4: On-demand files -->
  <rect x="40" y="308" width="228" height="76" rx="8" fill="url(#demand-grad)" filter="url(#shadow)" stroke="#d19a66" stroke-width="1"/>
  <text x="56" y="328" fill="#d19a66" font-size="9" font-weight="600" letter-spacing="1">ON DEMAND</text>
  <text x="56" y="346" fill="#e6edf3" font-size="13" font-weight="700">traditions-deep.md</text>
  <text x="56" y="360" fill="#8b949e" font-size="9">Full tradition encyclopedia</text>
  <text x="56" y="372" fill="#8b949e" font-size="9">75K chars • Deep application</text>

  <rect x="286" y="308" width="228" height="76" rx="8" fill="url(#demand-grad)" filter="url(#shadow)" stroke="#d19a66" stroke-width="1"/>
  <text x="302" y="328" fill="#d19a66" font-size="9" font-weight="600" letter-spacing="1">ON DEMAND</text>
  <text x="302" y="346" fill="#e6edf3" font-size="13" font-weight="700">conversation-toolkit.md</text>
  <text x="302" y="360" fill="#8b949e" font-size="9">MI/OARS • Life Story • Voss</text>
  <text x="302" y="372" fill="#8b949e" font-size="9">27K chars • Techniques</text>

  <rect x="532" y="308" width="228" height="76" rx="8" fill="url(#demand-grad)" filter="url(#shadow)" stroke="#d19a66" stroke-width="1"/>
  <text x="548" y="328" fill="#d19a66" font-size="9" font-weight="600" letter-spacing="1">ON DEMAND</text>
  <text x="548" y="346" fill="#e6edf3" font-size="13" font-weight="700">tone-and-voice.md</text>
  <text x="548" y="360" fill="#8b949e" font-size="9">Voice calibration • Examples</text>
  <text x="548" y="372" fill="#8b949e" font-size="9">12K chars • Refinement</text>

  <!-- Output / North Star -->
  <rect x="40" y="400" width="720" height="56" rx="8" fill="url(#output-grad)" filter="url(#shadow)" stroke="#c678dd" stroke-width="1.5"/>
  <text x="60" y="422" fill="#c678dd" font-size="10" font-weight="600" letter-spacing="1.5">THE NORTH STAR — EVERY RESPONSE</text>
  <text x="400" y="444" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600" font-style="italic">Understanding + Pattern Recognition + Connection + Movement</text>

  <!-- Arrows connecting layers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/>
    </marker>
  </defs>
  <line x1="400" y1="136" x2="400" y2="148" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="400" y1="224" x2="400" y2="238" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="154" y1="294" x2="154" y2="308" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="3,2"/>
  <line x1="400" y1="294" x2="400" y2="308" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="3,2"/>
  <line x1="646" y1="294" x2="646" y2="308" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="3,2"/>
  <line x1="400" y1="384" x2="400" y2="400" stroke="#8b949e" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <g transform="translate(40, 474)">
    <rect x="0" y="0" width="8" height="8" rx="1" fill="#e6c07b"/>
    <text x="14" y="8" fill="#8b949e" font-size="9">Cannot flex</text>
    <line x1="90" y1="4" x2="110" y2="4" stroke="#8b949e" stroke-width="1"/>
    <text x="116" y="8" fill="#8b949e" font-size="9">Always loaded</text>
    <line x1="190" y1="4" x2="210" y2="4" stroke="#8b949e" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="216" y="8" fill="#8b949e" font-size="9">Loaded on demand</text>
    <rect x="320" y="0" width="8" height="8" rx="1" fill="#c678dd"/>
    <text x="334" y="8" fill="#8b949e" font-size="9">Evaluation standard for all output</text>
  </g>

  <!-- Satori kanji -->
  <text x="760" y="504" text-anchor="end" fill="#30363d" font-size="32" font-weight="300">悟り</text>
</svg>
